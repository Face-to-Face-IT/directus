# See https://prek.j178.dev/ for more information
# Install hooks: pnpm prek install
# Run all hooks: pnpm prek run --all-files

repos:
  # Built-in hooks (fast, Rust-native)
  - repo: builtin
    hooks:
      - id: trailing-whitespace
      - id: end-of-file-fixer
      - id: check-yaml
      - id: check-json
        exclude: tsconfig\.json$
      - id: check-added-large-files
        args: ['--maxkb=500']
      - id: check-merge-conflict
      - id: detect-private-key

  # Local hooks for this project
  - repo: local
    hooks:
      - id: eslint
        name: eslint
        entry: pnpm lint --fix
        language: system
        files: \.(js|ts|vue)$
        pass_filenames: false

      - id: format
        name: prettier
        entry: pnpm format
        language: system
        files: \.(js|ts|vue|json|yaml|yml)$
        pass_filenames: false
